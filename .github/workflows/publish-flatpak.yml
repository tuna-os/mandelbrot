# Publishing is deliberately NOT triggered by every push to main: a publish
# run is a heavy flatpak build competing with CI for runners. Releases go out
# on tags, or on demand.
name: Build and Publish Flatpak OCI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-oci:
    name: "Build Flatpak OCI (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        manifest-path: org.tunaos.mandelbrot.json
        cache-key: flatpak-builder-${{ matrix.arch }}-${{ github.sha }}
        arch: ${{ matrix.arch }}
        build-bundle: false
        upload-artifact: false

    - name: Export OCI Directory
      run: |
        flatpak build-bundle --oci --arch=${{ matrix.arch }} \
          repo mandelbrot-${{ matrix.arch }}.oci org.tunaos.mandelbrot

    - name: Upload OCI Artifact
      uses: actions/upload-artifact@v7
      with:
        name: mandelbrot-oci-${{ matrix.arch }}
        path: mandelbrot-${{ matrix.arch }}.oci/
        retention-days: 1

  publish-oci:
    name: "Publish OCI & Update Index"
    needs: build-oci
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Download OCI Artifacts
      uses: actions/download-artifact@v8
      with:
        path: oci

    - name: Log in to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Push both arches to GHCR
      run: |
        # Each arch is pushed under an arch-qualified tag so both manifests are
        # retained (untagged manifests can be garbage-collected). The static
        # index records each arch's digest independently, so flatpak's oci+
        # remote resolves the right arch by digest regardless of tag.
        set -euo pipefail
        VERSION_TAG=""
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION_TAG="${{ github.ref_name }}"
        fi
        for arch in x86_64 aarch64; do
          dir="oci/mandelbrot-oci-${arch}"
          [ -d "$dir" ] || { echo "missing $dir"; exit 1; }
          skopeo copy "oci:${dir}" "docker://ghcr.io/tuna-os/mandelbrot:latest-${arch}"
          if [ -n "$VERSION_TAG" ]; then
            skopeo copy "oci:${dir}" "docker://ghcr.io/tuna-os/mandelbrot:${VERSION_TAG}-${arch}"
          fi
        done
        # Keep :latest pointing at x86_64 for anything that pulls it by tag.
        skopeo copy oci:oci/mandelbrot-oci-x86_64 docker://ghcr.io/tuna-os/mandelbrot:latest

    - name: Update central index (tuna-os/docs)
      run: |
        set -euo pipefail
        git clone --depth 1 \
          https://x-access-token:${{ secrets.FLATPAK_INDEX_TOKEN }}@github.com/tuna-os/docs.git \
          index-repo
        pip install requests
        # One entry per architecture; update-index.py replaces only the matching
        # arch, leaving the other in place.
        for arch in x86_64 aarch64; do
          python3 .github/scripts/update-index.py \
            --oci-dir "oci/mandelbrot-oci-${arch}" \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/mandelbrot \
            --tags latest
        done
        cd index-repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add static/flatpak/index/static
        if git diff --cached --quiet; then
          echo "No index changes"
        else
          git commit -m "chore(flatpak): update Mandelbrot OCI index (x86_64 + aarch64)"
          git push origin main
        fi
