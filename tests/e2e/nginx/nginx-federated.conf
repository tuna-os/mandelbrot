# nginx configuration for the FEDERATED MatrixRTC e2e stack
# (compose.yml + compose-federated.yml). Adapted from element-call's
# backend/dev_nginx.conf, which is the reference two-site setup.
#
# Routing:
#   host :8008   -> plain http, site 1 (synapse.m.localhost)
#   host :18008  -> plain http, site 2 (synapse.othersite.m.localhost)
#   host :8448   -> https, both sites, routed by Host/SNI. Both homeservers
#                   resolve their peer to 127.0.0.1:8448 (the default Matrix
#                   federation port), so one published port serves both.

server {
    listen                  80;
    listen                  [::]:80;
    listen                  443 ssl;
    listen                  8448 ssl;
    listen                  [::]:443 ssl;
    listen                  [::]:8448 ssl;
    server_name             synapse.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    location /.well-known/matrix/client {
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "http://127.0.0.1:8008"}, "org.matrix.msc4143.rtc_foci": [{"type": "livekit", "livekit_service_url": "http://127.0.0.1:6080"}]}';
        default_type application/json;
    }

    location ~ ^(/_matrix|/_synapse) {
        proxy_pass "http://homeserver:8008";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}

# MatrixRTC service proxy, kept for parity with the element-call stack
# (phase 2: Element Call in a browser can use these https endpoints).
server {
    listen                  443 ssl;
    listen                  [::]:443 ssl;
    server_name             matrix-rtc.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    http2 on;

    location ^~ /livekit/jwt/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The auth-service runs with host networking; reach it via the
        # host gateway.
        proxy_pass http://host.containers.internal:6080/;
    }

    location ^~ /livekit/sfu/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_send_timeout 120;
        proxy_read_timeout 120;
        proxy_buffering off;

        proxy_set_header Accept-Encoding gzip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # LiveKit runs with host networking; reach it via the host gateway.
        proxy_pass http://host.containers.internal:7880/;
    }
}

# ---------------------------------------------------------------------------
# Site 2: synapse.othersite.m.localhost
# ---------------------------------------------------------------------------
server {
    # 18008 is published on the host for plain-http client access; it is the
    # only server block on that port, so nginx uses it as the default there
    # and the Host header does not have to match.
    listen                  18008;
    listen                  [::]:18008;
    listen                  443 ssl;
    listen                  8448 ssl;
    listen                  [::]:443 ssl;
    listen                  [::]:8448 ssl;
    server_name             synapse.othersite.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    location /.well-known/matrix/client {
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "http://127.0.0.1:18008"}, "org.matrix.msc4143.rtc_foci": [{"type": "livekit", "livekit_service_url": "http://127.0.0.1:16080"}]}';
        default_type application/json;
    }

    location ~ ^(/_matrix|/_synapse) {
        proxy_pass "http://homeserver-1:18008";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}

# MatrixRTC service proxy for site 2, for parity with the element-call stack.
server {
    listen                  443 ssl;
    listen                  [::]:443 ssl;
    server_name             matrix-rtc.othersite.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    http2 on;

    location ^~ /livekit/jwt/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://host.containers.internal:16080/;
    }

    location ^~ /livekit/sfu/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_send_timeout 120;
        proxy_read_timeout 120;
        proxy_buffering off;

        proxy_set_header Accept-Encoding gzip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://host.containers.internal:17880/;
    }
}
