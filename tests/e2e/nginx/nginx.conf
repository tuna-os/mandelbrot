# nginx configuration for the MatrixRTC interop e2e stack.
# Adapted from element-call's backend/dev_nginx.conf (single site).
#
# Purpose:
# - Terminate TLS for synapse.m.localhost on 443/8448 INSIDE the compose
#   network: lk-jwt-service validates MSC4195 OpenID tokens through the
#   Matrix federation API, which gomatrixserverlib only speaks over https.
# - Expose synapse over plain http on port 80 (published as host port 8008)
#   for the test clients, which use webpki roots and would reject the
#   self-signed dev certificate.

server {
    listen                  80;
    listen                  [::]:80;
    listen                  443 ssl;
    listen                  8448 ssl;
    listen                  [::]:443 ssl;
    listen                  [::]:8448 ssl;
    server_name             synapse.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    location /.well-known/matrix/client {
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "http://127.0.0.1:8008"}, "org.matrix.msc4143.rtc_foci": [{"type": "livekit", "livekit_service_url": "http://127.0.0.1:6080"}]}';
        default_type application/json;
    }

    location ~ ^(/_matrix|/_synapse) {
        proxy_pass "http://homeserver:8008";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}

# MatrixRTC service proxy, kept for parity with the element-call stack
# (phase 2: Element Call in a browser can use these https endpoints).
server {
    listen                  443 ssl;
    listen                  [::]:443 ssl;
    server_name             matrix-rtc.m.localhost;
    ssl_certificate         /root/ssl/cert.pem;
    ssl_certificate_key     /root/ssl/key.pem;

    http2 on;

    location ^~ /livekit/jwt/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The auth-service runs with host networking; reach it via the
        # host gateway.
        proxy_pass http://host.containers.internal:6080/;
    }

    location ^~ /livekit/sfu/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_send_timeout 120;
        proxy_read_timeout 120;
        proxy_buffering off;

        proxy_set_header Accept-Encoding gzip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # LiveKit runs with host networking; reach it via the host gateway.
        proxy_pass http://host.containers.internal:7880/;
    }
}
